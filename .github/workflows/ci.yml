name: terraform-cicd

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  precommit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1

  terraform-fmt:
    name: Terraform fmt (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform validate (all stacks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate each stack
        shell: bash
        run: |
          set -euo pipefail
          cd stacks
          for d in $(find . -mindepth 1 -maxdepth 1 -type d); do
            echo "=== Validating stack: $d ==="
            (cd "$d" && terraform init -backend=false -input=false && terraform validate)
          done

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v6
      - name: tflint --init
        run: tflint --init

      - name: tflint (repo)
        run: tflint -f compact

  trufflehog:
    name: TruffleHog (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important for history scanning

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified