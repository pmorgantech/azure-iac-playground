name: terraform-cicd

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  terraform-fmt:
    name: Terraform fmt (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.3"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform validate (all stacks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: "1.14.3"

      - name: Validate each stack
        shell: bash
        run: |
          set -euo pipefail
          cd stacks
          for d in $(find . -mindepth 1 -maxdepth 1 -type d); do
            echo "=== Validating stack: $d ==="
            (cd "$d" && terraform init -backend=false -input=false && terraform validate)
          done

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v6
      - name: tflint --init
        run: tflint --init

      - name: tflint (repo)
        run: tflint -f compact

  trufflehog:
    name: TruffleHog (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PRs: scan the PR diff
      - name: TruffleHog PR diff
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      # Pushes: scan the pushed commit range
      - name: TruffleHog push range
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified